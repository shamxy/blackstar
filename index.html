<!DOCTYPE html>
<html>
<body>
  <div style="background: #f4f4f4; padding: 20px; border-bottom: 2px solid #000;">
  <h2>Your Cart</h2>
  <ul id="cart-list">
    <li>Cart is empty</li>
  </ul>
    <hr>
<button onclick="alert('Redirecting to Stripe... (Replace this with a real Stripe link later)')" 
        style="background: green; color: white; padding: 10px; width: 100%; cursor: pointer;">
  Proceed to Checkout
</button>
</div>
  <h1>My Store</h1>
  <div id="product-list"></div>

 <script>
  const cartList = document.getElementById('cart-list');

  function addToCart(name, price) {
    if (cartList.innerHTML === '<li>Cart is empty</li>') {
      cartList.innerHTML = '';
    }
    cartList.innerHTML += `<li>${name} - ${price}</li>`;
  }

  fetch('products.json')
    .then(response => response.json())
    .then(data => {
      const list = document.getElementById('product-list');
      data.forEach(product => {
        list.innerHTML += `
          <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
            <img src="${product.image}" alt="${product.name}">
            <h2>${product.name}</h2>
            <p>Price: ${product.price}</p>
            <button onclick="addToCart('${product.name}', '${product.price}')">Add to Cart</button>
          </div>
        `;
      });
    });
</script>
</body>
</html>
